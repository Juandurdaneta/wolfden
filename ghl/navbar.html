<style>
  /* ========================================
     FONT IMPORTS

  @import url("https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap");

  /* ========================================
     GLOBAL VARIABLES – WOLF DEN
     ======================================== */
  :root {
    --clr-charcoal: #1C1C1C;
    --clr-dark: #141414;
    --clr-light: #F5F5F7;
    --clr-white: #FFFFFF;
    --clr-blue: #0C7BDC;
    --clr-blue-deep: #064C8A;
    --clr-blue-glow: rgba(12, 123, 220, 0.4);
    --clr-amber: #E8A838;
    --clr-text: #FFFFFF;
    --clr-text-muted: #A0A0A0;
    --clr-text-secondary: #555555;
    --radius: 16px;
    --radius-sm: 8px;
    --font-display: "Plus Jakarta Sans", sans-serif;
    --font-body: "DM Sans", sans-serif;
    --ease-smooth: cubic-bezier(0.25, 0.46, 0.45, 0.94);
    --max-width: 1280px;
  }

  /* ========================================
     NAVBAR STYLES

  .wd-navbar {
    position: fixed;

    left: 0;

  .wd-navbar__container {

    margin: 0 auto;

    display: flex;

    align-items: center;

  /* Logo Styles */
  .wd-navbar__logo {
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    transition: opacity 0.3s ease;

  .wd-navbar__logo:hover {
    opacity: 0.85;

  .wd-navbar__toggle {

  .wd-navbar__link::after {

  /* ========================================

    .wd-navbar__link::after {

    /* Animated Toggle Button */

  @media (prefers-reduced-motion: reduce) {

    .wd-navbar__menu,

</style>

<script>
  document.addEventListener('DOMContentLoaded', function () {
    var navbarToggle = document.getElementById('wd-navbar-toggle');
    var navbarMenu = document.getElementById('wd-navbar-menu');
    var navbar = document.getElementById('wd-navbar');

    // Move navbar to be a direct child of <body> so position:fixed escapes
    // any GHL wrapper sections that would otherwise constrain it.
    if (navbar && navbar.parentNode !== document.body) {
      document.body.insertBefore(navbar, document.body.firstChild);
    }

    // Reserve space at the top of the page so content doesn't slide under
    // the fixed navbar. Re-measures on resize in case the navbar height changes.
    function syncNavbarOffset() {
      if (!navbar) return;
      var h = navbar.offsetHeight;
      document.body.style.paddingTop = h + 'px';
    }
    syncNavbarOffset();
    window.addEventListener('resize', syncNavbarOffset);

    // Mobile Menu Toggle
    if (navbarToggle && navbarMenu) {
      navbarToggle.addEventListener('click', function () {
        navbarToggle.classList.toggle('active');
        navbarMenu.classList.toggle('active');
        document.body.style.overflow = navbarMenu.classList.contains('active') ? 'hidden' : '';
      });

      // Close menu when clicking on a link
      var navbarLinks = navbarMenu.querySelectorAll('.wd-navbar__link, .wd-navbar__cta');
      navbarLinks.forEach(function (link) {
        link.addEventListener('click', function () {
          navbarToggle.classList.remove('active');
          navbarMenu.classList.remove('active');
          document.body.style.overflow = '';
        });
      });

      // Close menu when clicking outside
      document.addEventListener('click', function (event) {
        var isClickInsideNav = navbarToggle.contains(event.target) || navbarMenu.contains(event.target);
        if (!isClickInsideNav && navbarMenu.classList.contains('active')) {
          navbarToggle.classList.remove('active');
          navbarMenu.classList.remove('active');
          document.body.style.overflow = '';
        }
      });
    }

  });
</script>
